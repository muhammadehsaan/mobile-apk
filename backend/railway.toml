[build]
builder = "NIXPACKS"

[deploy]
startCommand = "if [ -f backend/manage.py ]; then cd backend; fi; python manage.py migrate && python manage.py collectstatic --no-input && gunicorn core.wsgi --bind 0.0.0.0:$PORT"
healthcheckPath = "/admin/login/"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
