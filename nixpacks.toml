[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["cd backend && python -m ensurepip --upgrade && python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt"]

[phases.build]
cmds = ["cd backend && python manage.py collectstatic --noinput"]

[start]
cmd = "cd backend && python manage.py migrate && gunicorn core.wsgi --bind 0.0.0.0:$PORT"
